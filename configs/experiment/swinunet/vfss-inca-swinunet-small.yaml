name: vfss-inca-swinunet-small
type: experiment

model:
  target: src.models.swin_unet.adapters.SwinUNet
  params:
    n_channels: 3
    n_classes: 2
    image_size: 256
    drop_path_rate: 0.2
    drop_rate: 0.0
    pretrain_ckpt: model_weights/swin-transformer/swin-tiny/swin_tiny_patch4_window7_224.pth
    swin:
      patch_size: 4
      in_chans: 3
      embed_dim: 96
      depths: [2, 2, 18, 2]
      decoder_depths: [2, 2, 2, 1]
      num_heads: [3, 6, 12, 24]
      window_size: 8
      mlp_ratio: 4.0
      qkv_bias: true
      qk_scale: null
      ape: false
      patch_norm: true
      final_upsample: expand_first

optimizer:
  target: torch.optim.AdamW
  params:
    lr: 1e-3
    weight_decay: 1e-4

lr_scheduler:
  target: torch.optim.lr_scheduler.CosineAnnealingLR
  params:
    T_max: 100
    eta_min: 1e-6

trainer:
  target: src.trainers.base.TrainerFromConfig
  params:
    max_epochs: 100
    accelerator: auto
    devices: auto
    check_val_every_n_epoch: 2
    accumulate_grad_batches: 1
  callbacks:
    - target: src.callbacks.PrintDeviceCallback

data:
  target: src.data.base.DataModuleFromConfig
  params:
    batch_size: 8
    num_workers: 8
    wrap: False
    shared_dataset_params:
      dataset_path: /data_ssd/caioseda/data/dataset_inca_all_frames/
      size: 256
      window_size: 1
      stride: 1
      repeat_channels: True
    train:
      target: src.data.vfss_v2.VFSSIncaTrain
    validation:
      target: src.data.vfss_v2.VFSSIncaVal
    test:
      target: src.data.vfss_v2.VFSSIncaTest
