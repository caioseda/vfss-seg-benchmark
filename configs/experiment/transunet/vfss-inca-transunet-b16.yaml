name: vfss-inca-transunet-b16
type: experiment

model:
  target: src.models.trans_unet.adapters.TransUNet
  params:
    n_channels: 3
    n_classes: 2
    image_size: 256
    vis: False
    patch_size: 16
    vit_config:
      patches:
        size: [16, 16]
      hidden_size: 768
      transformer:
        mlp_dim: 3072
        num_heads: 12
        num_layers: 12
        attention_dropout_rate: 0.0
        dropout_rate: 0.1
      classifier: seg
      representation_size: null
      resnet_pretrained_path: null
      resnet:
        num_layers: (3, 4, 9)
        width_factor: 1
      pretrained_path: null
      decoder_channels: [256, 128, 64, 16]
      skip_channels: [512, 256, 64, 16]
      n_classes: 2
      n_skip: 3
      activation: softmax

optimizer:
  target: torch.optim.AdamW
  params:
    lr: 1e-3
    weight_decay: 1e-4

trainer:
  target: src.trainers.base.TrainerFromConfig
  params:
    max_epochs: 100
    accelerator: auto
    devices: auto
    check_val_every_n_epoch: 2
    accumulate_grad_batches: 1
  callbacks:
    - target: src.callbacks.PrintDeviceCallback
    - target: pytorch_lightning.callbacks.DeviceStatsMonitor

data:
  target: src.data.base.DataModuleFromConfig
  params:
    batch_size: 8
    num_workers: 8
    wrap: False
    shared_dataset_params:
      data_root: ../dados_inca/metadados
      size: 256
    train:
      target: src.data.vfss.VFSSIncaTrain
    validation:
      target: src.data.vfss.VFSSIncaVal
    test:
      target: src.data.vfss.VFSSIncaTest
