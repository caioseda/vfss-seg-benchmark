name: vfss-unm-unetplusplus
type: experiment

model:
  target: src.models.unet_plus_plus.adapters.UNetPlusPlus
  params:
    n_channels: 3
    n_classes: 2
    base_num_features: 32
    num_pool: 5
    num_conv_per_stage: 2
    feat_map_mul_on_downscale: 2
    deep_supervision: False

optimizer:
  target: torch.optim.AdamW
  params:
    lr: 1e-3
    weight_decay: 1e-4

trainer:
  target: src.trainers.base.TrainerFromConfig
  params:
    max_epochs: 100
    accelerator: auto
    devices: auto
    check_val_every_n_epoch: 2
    accumulate_grad_batches: 1
  callbacks:
    - target: src.callbacks.PrintDeviceCallback
    

data:
  target: src.data.base.DataModuleFromConfig
  params:
    batch_size: 8
    num_workers: 8
    wrap: False
    shared_dataset_params:
      data_root: /data_ssd/caioseda/data/dataset_unm
      size: 256
      image_interpolation: bilinear
      mask_interpolation: nearest
    train:
      target: src.data.unm.VFSSUnmTrain
    validation:
      target: src.data.unm.VFSSUnmVal
    test:
      target: src.data.unm.VFSSUnmTest
